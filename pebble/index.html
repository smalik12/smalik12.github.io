<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pebble — Paycheck Budget</title>
    <style>
        :root {
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --bg: #ffffff;
            --accent: #1A9E6E;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text: #e8e8e8;
                --muted: #a0a0a0;
                --bg: #121212;
                --accent: #4CD87A;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            max-width: 680px;
            margin: 0 auto;
            padding: 96px 24px;
            -webkit-font-smoothing: antialiased;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 12px;
        }
        p { color: var(--muted); margin: 0 0 16px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Pebble</h1>
    <p>The budget app built around your paychecks. Coming soon to the App Store.</p>
    <p><a href="privacy.html">Privacy policy</a></p>
</body>
</html>
